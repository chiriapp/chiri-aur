name: Arch source package smoke

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arch-source-package-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and inspect chiri
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    container: archlinux:base-devel
    env:
      CARGO_HOME: /home/builder/.cargo
      MAKEPKG_SRCDEST: ${{ github.workspace }}/.makepkg/sources
      PNPM_STORE_DIR: /home/builder/.local/share/pnpm/store
    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare Arch container
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --needed git sudo namcap desktop-file-utils binutils tar zstd

          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - name: Checkout
        uses: actions/checkout@v6

      - name: Create cache directories
        run: |
          install -d -m 0755 -o builder -g builder \
            "$MAKEPKG_SRCDEST" \
            "$CARGO_HOME/git" \
            "$CARGO_HOME/registry" \
            "$PNPM_STORE_DIR"

      - name: Cache build inputs
        uses: actions/cache@v5
        with:
          path: |
            .makepkg/sources
            /home/builder/.cargo/git
            /home/builder/.cargo/registry
            /home/builder/.local/share/pnpm/store
          key: arch-source-inputs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('PKGBUILD') }}
          restore-keys: |
            arch-source-inputs-${{ runner.os }}-${{ runner.arch }}-

      - name: Check .SRCINFO is current
        run: |
          sudo chown -R builder:builder "$GITHUB_WORKSPACE" "$CARGO_HOME" "$PNPM_STORE_DIR"
          sudo -u builder env \
            HOME=/home/builder \
            CARGO_HOME="$CARGO_HOME" \
            SRCDEST="$MAKEPKG_SRCDEST" \
            npm_config_store_dir="$PNPM_STORE_DIR" \
            makepkg --printsrcinfo > .SRCINFO.generated
          diff -u .SRCINFO .SRCINFO.generated

      - name: Build package
        run: |
          sudo -u builder env \
            HOME=/home/builder \
            CARGO_HOME="$CARGO_HOME" \
            SRCDEST="$MAKEPKG_SRCDEST" \
            npm_config_store_dir="$PNPM_STORE_DIR" \
            makepkg --syncdeps --noconfirm --noprogressbar --cleanbuild

      - name: Run namcap
        run: |
          namcap PKGBUILD || true
          namcap ./*.pkg.tar.zst || true

      - name: Install package
        run: |
          pacman -U --noconfirm ./*.pkg.tar.zst

      - name: Inspect installed files
        run: |
          pacman -Qql chiri

          test -x /usr/bin/Chiri

          desktop_file="$(pacman -Qql chiri | grep '/usr/share/applications/.*\.desktop$' | head -n1)"
          test -n "$desktop_file"
          desktop-file-validate "$desktop_file"

          ldd /usr/bin/Chiri | tee /tmp/chiri-ldd.txt
          ! grep -q "not found" /tmp/chiri-ldd.txt
